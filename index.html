<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pascua - Elige un Huevo Decorado</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dropping">
  <canvas id="sky"></canvas>

  <div id="splash" aria-hidden="false">
    <div id="splash-stars" aria-hidden="true"></div>
    <div id="splash-content" role="dialog" aria-label="Pantalla de carga">
      <img id="logo2" src="images/logo2.png" alt="logo2" />
      <div id="loading-wrap" aria-hidden="true">
        <div id="loading-label">Decorando los huevos...</div>
        <div id="loading-bar">
          <div id="loading-progress" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <header class="page-header" role="banner">
    <h1>Elige un Huevo Decorado</h1>
  </header>

  <main>
    <img id="logo" src="images/logo.png" alt="logo" class="hide-until-bottom" />

    <div class="stars" role="list" aria-label="Elige un huevo decorado">
      
      <button class="star final-1" data-index="0" aria-label="Huevo decorado izquierdo" role="listitem">
        <div class="star-inner" aria-hidden="true">
          <svg viewBox="0 0 120 160" class="star-svg" xmlns="http://www.w3.org/2000/svg" overflow="visible">
            <defs>
              <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            
            <path class="egg-halo" d="M 60,10 C 95,10 110,150 60,150 C 10,150 25,10 60,10 Z"></path>
            
            <path class="egg-base" d="M 60,10 C 95,10 110,150 60,150 C 10,150 25,10 60,10 Z"></path>
            
            <g filter="url(#softGlow)">
              <path class="decor-band-purple" d="M 23,60 C 40,55 60,70 80,60 C 90,55 100,60 102,65 L 105,105 C 100,110 90,105 80,110 C 60,100 40,115 25,105 Z"></path>
              
              <path class="decor-wave-pink" d="M 30,45 C 50,35 70,55 90,45" stroke-width="3" fill="none"></path>
              <path class="decor-wave-orange" d="M 30,120 C 50,110 70,130 90,120" stroke-width="3" fill="none"></path>
              
              <circle class="decor-circle" cx="40" cy="85" r="5"></circle>
              <circle class="decor-circle" cx="60" cy="85" r="5"></circle>
              <circle class="decor-circle" cx="80" cy="85" r="5"></circle>
            </g>
          </svg>
          <div class="ground-shadow" aria-hidden="true"></div>
        </div>
      </button>

      <button class="star final-2" data-index="1" aria-label="Huevo decorado central" role="listitem">
        <div class="star-inner" aria-hidden="true">
          <svg viewBox="0 0 120 160" class="star-svg" xmlns="http://www.w3.org/2000/svg" overflow="visible">
            <use href="#softGlow"/>
            <path class="egg-halo" d="M 60,10 C 95,10 110,150 60,150 C 10,150 25,10 60,10 Z"></path>
            <path class="egg-base" d="M 60,10 C 95,10 110,150 60,150 C 10,150 25,10 60,10 Z"></path>
            <g filter="url(#softGlow)">
              <path class="decor-band-purple" d="M 23,60 C 40,55 60,70 80,60 C 90,55 100,60 102,65 L 105,105 C 100,110 90,105 80,110 C 60,100 40,115 25,105 Z"></path>
              <path class="decor-wave-pink" d="M 30,45 C 50,35 70,55 90,45" stroke-width="3" fill="none"></path>
              <path class="decor-wave-orange" d="M 30,120 C 50,110 70,130 90,120" stroke-width="3" fill="none"></path>
              <circle class="decor-circle" cx="40" cy="85" r="5"></circle>
              <circle class="decor-circle" cx="60" cy="85" r="5"></circle>
              <circle class="decor-circle" cx="80" cy="85" r="5"></circle>
            </g>
          </svg>
          <div class="ground-shadow" aria-hidden="true"></div>
        </div>
      </button>

      <button class="star final-3" data-index="2" aria-label="Huevo decorado derecho" role="listitem">
        <div class="star-inner" aria-hidden="true">
          <svg viewBox="0 0 120 160" class="star-svg" xmlns="http://www.w3.org/2000/svg" overflow="visible">
            <use href="#softGlow"/>
            <path class="egg-halo" d="M 60,10 C 95,10 110,150 60,150 C 10,150 25,10 60,10 Z"></path>
            <path class="egg-base" d="M 60,10 C 95,10 110,150 60,150 C 10,150 25,10 60,10 Z"></path>
            <g filter="url(#softGlow)">
              <path class="decor-band-purple" d="M 23,60 C 40,55 60,70 80,60 C 90,55 100,60 102,65 L 105,105 C 100,110 90,105 80,110 C 60,100 40,115 25,105 Z"></path>
              <path class="decor-wave-pink" d="M 30,45 C 50,35 70,55 90,45" stroke-width="3" fill="none"></path>
              <path class="decor-wave-orange" d="M 30,120 C 50,110 70,130 90,120" stroke-width="3" fill="none"></path>
              <circle class="decor-circle" cx="40" cy="85" r="5"></circle>
              <circle class="decor-circle" cx="60" cy="85" r="5"></circle>
              <circle class="decor-circle" cx="80" cy="85" r="5"></circle>
            </g>
          </svg>
          <div class="ground-shadow" aria-hidden="true"></div>
        </div>
      </button>
    </div>

    <div id="result" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">¡Ganaste!</h2>
        <p id="prize-text"></p>
        <p id="prize-date" class="prize-date"></p>
        <button id="close-btn" class="btn-primary">Cerrar</button>
      </div>
    </div>
    <div id="confetti"></div>
  </main>

  <footer id="bottom-logo-container"></footer>

  <svg width="0" height="0" style="position:absolute; pointer-events:none;">
    <defs>
      <filter id="haloBlur"><feGaussianBlur in="SourceGraphic" stdDeviation="12"/></filter>
      <linearGradient id="gradA" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#FFF9E5"/>
        <stop offset="40%" stop-color="#FFD15C"/>
        <stop offset="100%" stop-color="#D49400"/>
      </linearGradient>
    </defs>
  </svg>
  <script src="script.js"></script>
</body>
</html>
