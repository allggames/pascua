<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pascua - Elige un Huevo Decorado</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dropping">
  <canvas id="sky"></canvas>

  <div id="splash" aria-hidden="false">
    <div id="splash-stars" aria-hidden="true"></div>
    <div id="splash-content" role="dialog" aria-label="Pantalla de carga">
      <img id="logo2" src="images/logo2.png" alt="logo2" />
      <div id="loading-wrap" aria-hidden="true">
        <div id="loading-label">Pintando los huevos...</div>
        <div id="loading-bar">
          <div id="loading-progress" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <header class="page-header" role="banner">
    <h1>Elige un Huevo de Pascua</h1>
  </header>

  <main>
    <img id="logo" src="images/logo.png" alt="logo" class="hide-until-bottom" />

    <div class="stars" role="list">
      
      <button class="star final-1" data-index="0" role="listitem">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg">
            <path class="egg-halo" d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z"></path>
            <path class="egg-base" d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z"></path>
            <path class="egg-purple-band" d="M22,65 Q60,50 98,65 L105,105 Q60,120 15,105 Z"></path>
            <path class="egg-wave-pink" d="M30,45 Q60,30 90,45" fill="none" stroke-width="4"></path>
            <path class="egg-wave-orange" d="M25,125 Q60,110 95,125" fill="none" stroke-width="4"></path>
            <circle class="egg-dot" cx="40" cy="85" r="5"></circle>
            <circle class="egg-dot" cx="60" cy="85" r="5"></circle>
            <circle class="egg-dot" cx="80" cy="85" r="5"></circle>
          </svg>
          <div class="ground-shadow"></div>
        </div>
      </button>

      <button class="star final-2" data-index="1" role="listitem">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg">
            <path class="egg-halo" d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z"></path>
            <path class="egg-base" d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z"></path>
            <path class="egg-purple-band" d="M22,65 Q60,50 98,65 L105,105 Q60,120 15,105 Z"></path>
            <path class="egg-wave-pink" d="M30,45 Q60,30 90,45" fill="none" stroke-width="4"></path>
            <path class="egg-wave-orange" d="M25,125 Q60,110 95,125" fill="none" stroke-width="4"></path>
            <circle class="egg-dot" cx="40" cy="85" r="5"></circle>
            <circle class="egg-dot" cx="60" cy="85" r="5"></circle>
            <circle class="egg-dot" cx="80" cy="85" r="5"></circle>
          </svg>
          <div class="ground-shadow"></div>
        </div>
      </button>

      <button class="star final-3" data-index="2" role="listitem">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg">
            <path class="egg-halo" d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z"></path>
            <path class="egg-base" d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z"></path>
            <path class="egg-purple-band" d="M22,65 Q60,50 98,65 L105,105 Q60,120 15,105 Z"></path>
            <path class="egg-wave-pink" d="M30,45 Q60,30 90,45" fill="none" stroke-width="4"></path>
            <path class="egg-wave-orange" d="M25,125 Q60,110 95,125" fill="none" stroke-width="4"></path>
            <circle class="egg-dot" cx="40" cy="85" r="5"></circle>
            <circle class="egg-dot" cx="60" cy="85" r="5"></circle>
            <circle class="egg-dot" cx="80" cy="85" r="5"></circle>
          </svg>
          <div class="ground-shadow"></div>
        </div>
      </button>
    </div>

    <div id="result" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">¡Ganaste!</h2>
        <p id="prize-text"></p>
        <p id="prize-date" class="prize-date"></p>
        <button id="close-btn" class="btn-primary">Cerrar</button>
      </div>
    </div>

    <div id="confetti"></div>
  </main>

  <footer id="bottom-logo-container"></footer>

  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <filter id="haloBlur"><feGaussianBlur in="SourceGraphic" stdDeviation="10"/></filter>
    </defs>
  </svg>

  <audio id="claim-sound" preload="auto">
    <source src="sound/claim.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
