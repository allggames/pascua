<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pascua - Elige un Huevo Decorado</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dropping">
  <canvas id="sky"></canvas>

  <div id="easter-landscape">
    <svg viewBox="0 0 1000 300" preserveAspectRatio="xMidYMax slice" class="landscape-svg">
      
      <path d="M150,80 Q170,50 210,70 Q250,50 280,80 Q310,100 280,120 L150,120 Q120,110 150,80 Z" fill="#FFF" opacity="0.6"/>
      <path d="M750,50 Q770,20 810,40 Q850,20 880,50 Q910,70 880,90 L750,90 Q720,80 750,50 Z" fill="#FFF" opacity="0.5"/>
      <circle cx="900" cy="60" r="35" fill="#FFF59D" opacity="0.9"/>

      <path d="M0,200 Q250,100 500,180 T1000,120 L1000,300 L0,300 Z" fill="#A8D5BA" />
      
      <path d="M0,250 Q300,150 600,220 T1000,180 L1000,300 L0,300 Z" fill="#81C784" />

      <path d="M0,300 L0,220 Q200,160 450,260 T1000,230 L1000,300 Z" fill="#66BB6A" />

      <g fill="#FFF" stroke="#FFB300" stroke-width="2">
        <circle cx="250" cy="240" r="4"/>
        <circle cx="265" cy="248" r="3"/>
        <circle cx="550" cy="210" r="4.5"/>
        <circle cx="565" cy="215" r="3"/>
        <circle cx="850" cy="260" r="4"/>
        <circle cx="830" cy="270" r="3"/>
      </g>

      <g transform="translate(180, 165)">
        <ellipse cx="-10" cy="-20" rx="6" ry="20" fill="#FFF" transform="rotate(-15 -10 -20)" />
        <ellipse cx="-10" cy="-20" rx="3" ry="14" fill="#FFB7B2" transform="rotate(-15 -10 -20)" />
        <ellipse cx="10" cy="-20" rx="6" ry="20" fill="#FFF" transform="rotate(15 10 -20)" />
        <ellipse cx="10" cy="-20" rx="3" ry="14" fill="#FFB7B2" transform="rotate(15 10 -20)" />
        
        <ellipse cx="0" cy="25" rx="22" ry="28" fill="#FFF" />
        <circle cx="0" cy="0" r="18" fill="#FFF" />
        
        <circle cx="-6" cy="-2" r="2.5" fill="#333" />
        <circle cx="6" cy="-2" r="2.5" fill="#333" />
        <polygon points="-2,3 2,3 0,6" fill="#FFB7B2" />
        <path d="M -5,5 Q -15,5 -20,2 M -5,7 Q -15,10 -20,12 M 5,5 Q 15,5 20,2 M 5,7 Q 15,10 20,12" fill="none" stroke="#DDD" stroke-width="1.5" stroke-linecap="round"/>
        
        <ellipse cx="-10" cy="45" rx="7" ry="10" fill="#FFF" stroke="#EEE" stroke-width="1"/>
        <ellipse cx="10" cy="45" rx="7" ry="10" fill="#FFF" stroke="#EEE" stroke-width="1"/>
      </g>

      <g transform="translate(780, 175) scale(1.1)">
        <path d="M10,20 C10,-30 90,-30 90,20" fill="none" stroke="#8D6E63" stroke-width="8" stroke-linecap="round" />
        <path d="M10,20 C10,-30 90,-30 90,20" fill="none" stroke="#D7CCC8" stroke-width="2" stroke-dasharray="6,6" />
        
        <g stroke="#FFF" stroke-width="1">
            <ellipse cx="30" cy="10" rx="12" ry="16" fill="#FFB7B2" transform="rotate(-25 30 10)"/>
            <path d="M18,5 Q30,15 42,5" fill="none" stroke="#FFF" stroke-width="2.5" transform="rotate(-25 30 10)"/>
            
            <ellipse cx="70" cy="12" rx="11" ry="15" fill="#E2B6FF" transform="rotate(20 70 12)"/>
            <circle cx="70" cy="8" r="1.5" fill="#FFF" transform="rotate(20 70 12)"/>
            <circle cx="65" cy="15" r="1.5" fill="#FFF" transform="rotate(20 70 12)"/>
            <circle cx="75" cy="15" r="1.5" fill="#FFF" transform="rotate(20 70 12)"/>

            <ellipse cx="50" cy="5" rx="12" ry="17" fill="#FFFBCB" />
            <path d="M38,2 L62,2 M38,6 L62,6" fill="none" stroke="#FF9800" stroke-width="2"/>
        </g>

        <path d="M5,20 L25,55 L75,55 L95,20 Z" fill="#A1887F" />
        <path d="M10,28 L90,28 M15,38 L85,38 M20,48 L80,48 M35,20 L30,55 M50,20 L50,55 M65,20 L70,55" fill="none" stroke="#6D4C41" stroke-width="2" opacity="0.6"/>
        <path d="M5,20 L95,20" stroke="#5D4037" stroke-width="6" stroke-linecap="round"/>
        
        <g transform="translate(15, 12) rotate(-15)">
            <path d="M0,0 Q -10,-10 -15,0 Q -10,10 0,0" fill="#FF5252"/>
            <path d="M0,0 Q 10,-10 15,0 Q 10,10 0,0" fill="#FF5252"/>
            <circle cx="0" cy="0" r="3" fill="#B71C1C"/>
            <path d="M0,0 Q -5,10 -8,18 M0,0 Q 5,10 8,18" fill="none" stroke="#FF5252" stroke-width="2.5" stroke-linecap="round"/>
        </g>
      </g>
    </svg>
  </div>

  <div id="splash" aria-hidden="false">
    <div id="splash-stars" aria-hidden="true"></div>
    <div id="splash-content" role="dialog" aria-label="Pantalla de carga">
      <img id="logo2" src="images/logo2.png" alt="logo" />
      <div id="loading-wrap" aria-hidden="true">
        <div id="loading-label">Decorando los huevos...</div>
        <div id="loading-bar">
          <div id="loading-progress" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <header class="page-header" role="banner">
    <h1>Elige un Huevo de Pascua</h1>
  </header>

  <main>
    <img id="logo" src="images/logo.png" alt="logo" class="hide-until-bottom" />

    <div class="stars" role="list">
      <button class="star final-1" data-index="0" role="listitem">
        <div class="star-inner">
        <svg viewBox="0 0 120 160" class="star-svg">
  <defs>
    <path id="egg-shape" d="M 60,10 C 95,10 110,70 110,110 C 110,140 85,150 60,150 C 35,150 10,140 10,110 C 10,70 25,10 60,10 Z" />

    <radialGradient id="realistic-egg-gradient" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="20%" stop-color="#FFFAF0" />
      <stop offset="65%" stop-color="#D2B48C" />
      <stop offset="100%" stop-color="#8B7355" />
    </radialGradient>

    <clipPath id="egg-clip">
      <use href="#egg-shape" />
    </clipPath>
  </defs>

  <use href="#egg-shape" fill="url(#realistic-egg-gradient)" />

  <g clip-path="url(#egg-clip)">
    <path d="M -10,35 Q 25,20 60,35 T 130,35" fill="none" stroke="var(--egg-pink)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,65 Q 25,80 60,65 T 130,65" fill="none" stroke="var(--egg-purple)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,95 Q 25,80 60,95 T 130,95" fill="none" stroke="var(--egg-orange)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,125 Q 25,140 60,125 T 130,125" fill="none" stroke="var(--egg-green)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
          <div class="ground-shadow"></div>
        </div>
      </button>

      <button class="star final-2" data-index="1" role="listitem">
        <div class="star-inner">
         <svg viewBox="0 0 120 160" class="star-svg">
  <defs>
    <path id="egg-shape" d="M 60,10 C 95,10 110,70 110,110 C 110,140 85,150 60,150 C 35,150 10,140 10,110 C 10,70 25,10 60,10 Z" />

    <radialGradient id="realistic-egg-gradient" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="20%" stop-color="#FFFAF0" />
      <stop offset="65%" stop-color="#D2B48C" />
      <stop offset="100%" stop-color="#8B7355" />
    </radialGradient>

    <clipPath id="egg-clip">
      <use href="#egg-shape" />
    </clipPath>
  </defs>

  <use href="#egg-shape" fill="url(#realistic-egg-gradient)" />

  <g clip-path="url(#egg-clip)">
    <path d="M -10,35 Q 25,20 60,35 T 130,35" fill="none" stroke="var(--egg-pink)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,65 Q 25,80 60,65 T 130,65" fill="none" stroke="var(--egg-purple)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,95 Q 25,80 60,95 T 130,95" fill="none" stroke="var(--egg-orange)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,125 Q 25,140 60,125 T 130,125" fill="none" stroke="var(--egg-green)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
          <div class="ground-shadow"></div>
        </div>
      </button>

      <button class="star final-3" data-index="2" role="listitem">
        <div class="star-inner">
        <svg viewBox="0 0 120 160" class="star-svg">
  <defs>
    <path id="egg-shape" d="M 60,10 C 95,10 110,70 110,110 C 110,140 85,150 60,150 C 35,150 10,140 10,110 C 10,70 25,10 60,10 Z" />

    <radialGradient id="realistic-egg-gradient" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="20%" stop-color="#FFFAF0" />
      <stop offset="65%" stop-color="#D2B48C" />
      <stop offset="100%" stop-color="#8B7355" />
    </radialGradient>

    <clipPath id="egg-clip">
      <use href="#egg-shape" />
    </clipPath>
  </defs>

  <use href="#egg-shape" fill="url(#realistic-egg-gradient)" />

  <g clip-path="url(#egg-clip)">
    <path d="M -10,35 Q 25,20 60,35 T 130,35" fill="none" stroke="var(--egg-pink)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,65 Q 25,80 60,65 T 130,65" fill="none" stroke="var(--egg-purple)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,95 Q 25,80 60,95 T 130,95" fill="none" stroke="var(--egg-orange)" stroke-width="4" stroke-linecap="round" />
    
    <path d="M -10,125 Q 25,140 60,125 T 130,125" fill="none" stroke="var(--egg-green)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
          <div class="ground-shadow"></div>
        </div>
      </button>
    </div>

    <div id="result" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">¡Ganaste!</h2>
        <p id="prize-text"></p>
        <p id="prize-date" class="prize-date"></p>
        <button id="close-btn" class="btn-primary">Cerrar</button>
      </div>
    </div>
    <div id="confetti"></div>
  </main>

  <footer id="bottom-logo-container"></footer>

  <svg width="0" height="0" style="position:absolute; pointer-events:none;">
    <defs>
      <filter id="haloBlur"><feGaussianBlur in="SourceGraphic" stdDeviation="12"/></filter>
    </defs>
  </svg>

  <audio id="claim-sound" preload="auto">
    <source src="sound/claim.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
