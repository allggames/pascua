<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pascua - Elige un Huevo</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="sky"></canvas>

  <div id="splash">
    <div id="splash-stars"></div>
    <div id="splash-content">
      <img id="logo2" src="images/logo2.png" alt="logo" />
      <div id="loading-wrap">
        <div id="loading-label">Preparando los huevos...</div>
        <div id="loading-bar">
          <div id="loading-progress"></div>
        </div>
      </div>
    </div>
  </div>

  <header class="page-header">
    <h1>Elige un Huevo de Pascua</h1>
  </header>

  <main>
    <div class="stars">
      <button class="star" data-index="0">
        <svg viewBox="0 0 120 120" class="star-svg">
          <path class="halo" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
          <path class="body" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
          <path class="rim" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
        </svg>
      </button>

      <button class="star" data-index="1">
        <svg viewBox="0 0 120 120" class="star-svg">
          <path class="halo" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
          <path class="body" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
          <path class="rim" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
        </svg>
      </button>

      <button class="star" data-index="2">
        <svg viewBox="0 0 120 120" class="star-svg">
          <path class="halo" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
          <path class="body" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
          <path class="rim" d="M 60,15 C 95,15 95,105 60,105 C 25,105 25,15 60,15 Z"></path>
        </svg>
      </button>
    </div>

    <div id="result" class="modal">
      <div class="modal-content">
        <h2 id="modal-title">¡Ganaste!</h2>
        <p id="prize-text"></p>
        <p id="prize-date"></p>
        <button id="close-btn" class="btn-primary">Cerrar</button>
      </div>
    </div>
  </main>

  <footer id="bottom-logo-container">
     <img id="logo" src="images/logo.png" alt="logo" class="hide-until-bottom" />
  </footer>

  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <filter id="haloBlur">
        <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
      </filter>
      <linearGradient id="gradA" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#fff8d8"/>
        <stop offset="50%" stop-color="#ffb84d"/>
        <stop offset="100%" stop-color="#8b5a2b"/>
      </linearGradient>
    </defs>
  </svg>

  <script src="script.js"></script>
</body>
</html>
