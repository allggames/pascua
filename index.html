<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pascua - Elige un Huevo</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dropping">
  <canvas id="sky"></canvas>

  <div id="splash">
    <div id="splash-stars"></div>
    <div id="splash-content">
      <img id="logo2" src="images/logo2.png" alt="logo" style="width:200px;">
      <div id="loading-wrap">
        <div id="loading-bar"><div id="loading-progress"></div></div>
      </div>
    </div>
  </div>

  <header class="page-header">
    <h1>Elige un Huevo de Pascua</h1>
  </header>

  <main>
    <div class="stars">
      <button class="star final-1" data-index="0">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg">
            <path d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z" fill="#ffee58"></path>
            <path d="M22,65 Q60,50 98,65 L105,105 Q60,120 15,105 Z" fill="#9c27b0"></path>
            <path d="M30,45 Q60,30 90,45" fill="none" stroke="#e91e63" stroke-width="4"></path>
            <path d="M25,125 Q60,110 95,125" fill="none" stroke="#ff9800" stroke-width="4"></path>
            <circle cx="40" cy="85" r="5" fill="#4caf50"></circle>
            <circle cx="60" cy="85" r="5" fill="#4caf50"></circle>
            <circle cx="80" cy="85" r="5" fill="#4caf50"></circle>
          </svg>
          <div class="ground-shadow"></div>
        </div>
      </button>

      <button class="star final-2" data-index="1">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg">
            <path d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z" fill="#ffee58"></path>
            <path d="M22,65 Q60,50 98,65 L105,105 Q60,120 15,105 Z" fill="#9c27b0"></path>
            <path d="M30,45 Q60,30 90,45" fill="none" stroke="#e91e63" stroke-width="4"></path>
            <path d="M25,125 Q60,110 95,125" fill="none" stroke="#ff9800" stroke-width="4"></path>
            <circle cx="40" cy="85" r="5" fill="#4caf50"></circle>
            <circle cx="60" cy="85" r="5" fill="#4caf50"></circle>
            <circle cx="80" cy="85" r="5" fill="#4caf50"></circle>
          </svg>
          <div class="ground-shadow"></div>
        </div>
      </button>

      <button class="star final-3" data-index="2">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg">
            <path d="M60,10 C90,10 110,150 60,150 C10,150 30,10 60,10 Z" fill="#ffee58"></path>
            <path d="M22,65 Q60,50 98,65 L105,105 Q60,120 15,105 Z" fill="#9c27b0"></path>
            <path d="M30,45 Q60,30 90,45" fill="none" stroke="#e91e63" stroke-width="4"></path>
            <path d="M25,125 Q60,110 95,125" fill="none" stroke="#ff9800" stroke-width="4"></path>
            <circle cx="40" cy="85" r="5" fill="#4caf50"></circle>
            <circle cx="60" cy="85" r="5" fill="#4caf50"></circle>
            <circle cx="80" cy="85" r="5" fill="#4caf50"></circle>
          </svg>
          <div class="ground-shadow"></div>
        </div>
      </button>
    </div>

    <div id="result" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">¡Ganaste!</h2>
        <p id="prize-text"></p>
        <button id="close-btn" class="btn-primary">Cerrar</button>
      </div>
    </div>
    <div id="confetti"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
