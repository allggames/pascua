<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pascua - Elige un Huevo Decorado</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dropping">
  <canvas id="sky"></canvas>

  <div id="splash" aria-hidden="false">
    <div id="splash-stars" aria-hidden="true"></div>
    <div id="splash-content" role="dialog" aria-label="Pantalla de carga">
      <img id="logo2" src="images/logo2.png" alt="logo" />
      <div id="loading-wrap" aria-hidden="true">
        <div id="loading-label">Decorando los huevos...</div>
        <div id="loading-bar">
          <div id="loading-progress" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <header class="page-header" role="banner">
    <h1>Elige un Huevo de Pascua</h1>
  </header>

  <main>
    <img id="logo" src="images/logo.png" alt="logo" class="hide-until-bottom" />

    <div class="stars" role="list">
      <button class="star final-1" data-index="0" role="listitem">
        <div class="star-inner">
        <svg viewBox="0 0 120 160" class="star-svg">
  <defs>
    <path id="egg-shape" d="M 60,10 C 95,10 110,70 110,110 C 110,140 85,150 60,150 C 35,150 10,140 10,110 C 10,70 25,10 60,10 Z" />

    <radialGradient id="realistic-egg-gradient" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" /> <stop offset="20%" stop-color="#FFFAF0" />
      <stop offset="65%" stop-color="#D2B48C" />
      <stop offset="100%" stop-color="#8B7355" /> </radialGradient>

    <clipPath id="egg-clip">
      <use href="#egg-shape" />
    </clipPath>
  </defs>

  <use href="#egg-shape" fill="url(#realistic-egg-gradient)" />

  <g clip-path="url(#egg-clip)">
    <path class="egg-purple-band" d="M -10,70 Q 60,90 130,70 L 130,100 Q 60,120 -10,100 Z" fill="var(--egg-purple)" />

    <circle class="egg-dot" cx="30" cy="95" r="5" fill="var(--egg-green)" />
    <circle class="egg-dot" cx="60" cy="105" r="5" fill="var(--egg-green)" />
    <circle class="egg-dot" cx="90" cy="95" r="5" fill="var(--egg-green)" />

    <path d="M -10,35 Q 25,20 60,35 T 130,35" fill="none" stroke="var(--egg-pink)" stroke-width="4" stroke-linecap="round" />
    <path d="M -10,125 Q 25,140 60,125 T 130,125" fill="none" stroke="var(--egg-orange)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
          <div class="ground-shadow"></div>
        </div>
      </button>

      <button class="star final-2" data-index="1" role="listitem">
        <div class="star-inner">
         <svg viewBox="0 0 120 160" class="star-svg">
  <defs>
    <path id="egg-shape" d="M 60,10 C 95,10 110,70 110,110 C 110,140 85,150 60,150 C 35,150 10,140 10,110 C 10,70 25,10 60,10 Z" />

    <radialGradient id="realistic-egg-gradient" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" /> <stop offset="20%" stop-color="#FFFAF0" />
      <stop offset="65%" stop-color="#D2B48C" />
      <stop offset="100%" stop-color="#8B7355" /> </radialGradient>

    <clipPath id="egg-clip">
      <use href="#egg-shape" />
    </clipPath>
  </defs>

  <use href="#egg-shape" fill="url(#realistic-egg-gradient)" />

  <g clip-path="url(#egg-clip)">
    <path class="egg-purple-band" d="M -10,70 Q 60,90 130,70 L 130,100 Q 60,120 -10,100 Z" fill="var(--egg-purple)" />

    <circle class="egg-dot" cx="30" cy="95" r="5" fill="var(--egg-green)" />
    <circle class="egg-dot" cx="60" cy="105" r="5" fill="var(--egg-green)" />
    <circle class="egg-dot" cx="90" cy="95" r="5" fill="var(--egg-green)" />

    <path d="M -10,35 Q 25,20 60,35 T 130,35" fill="none" stroke="var(--egg-pink)" stroke-width="4" stroke-linecap="round" />
    <path d="M -10,125 Q 25,140 60,125 T 130,125" fill="none" stroke="var(--egg-orange)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
          <div class="ground-shadow"></div>
        </div>
      </button>

      <button class="star final-3" data-index="2" role="listitem">
        <div class="star-inner">
        <svg viewBox="0 0 120 160" class="star-svg">
  <defs>
    <path id="egg-shape" d="M 60,10 C 95,10 110,70 110,110 C 110,140 85,150 60,150 C 35,150 10,140 10,110 C 10,70 25,10 60,10 Z" />

    <radialGradient id="realistic-egg-gradient" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" /> <stop offset="20%" stop-color="#FFFAF0" />
      <stop offset="65%" stop-color="#D2B48C" />
      <stop offset="100%" stop-color="#8B7355" /> </radialGradient>

    <clipPath id="egg-clip">
      <use href="#egg-shape" />
    </clipPath>
  </defs>

  <use href="#egg-shape" fill="url(#realistic-egg-gradient)" />

  <g clip-path="url(#egg-clip)">
    <path class="egg-purple-band" d="M -10,70 Q 60,90 130,70 L 130,100 Q 60,120 -10,100 Z" fill="var(--egg-purple)" />

    <circle class="egg-dot" cx="30" cy="95" r="5" fill="var(--egg-green)" />
    <circle class="egg-dot" cx="60" cy="105" r="5" fill="var(--egg-green)" />
    <circle class="egg-dot" cx="90" cy="95" r="5" fill="var(--egg-green)" />

    <path d="M -10,35 Q 25,20 60,35 T 130,35" fill="none" stroke="var(--egg-pink)" stroke-width="4" stroke-linecap="round" />
    <path d="M -10,125 Q 25,140 60,125 T 130,125" fill="none" stroke="var(--egg-orange)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
          <div class="ground-shadow"></div>
        </div>
      </button>
    </div>

    <div id="result" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">¡Ganaste!</h2>
        <p id="prize-text"></p>
        <p id="prize-date" class="prize-date"></p>
        <button id="close-btn" class="btn-primary">Cerrar</button>
      </div>
    </div>
    <div id="confetti"></div>
  </main>

  <footer id="bottom-logo-container"></footer>

  <svg width="0" height="0" style="position:absolute; pointer-events:none;">
    <defs>
      <filter id="haloBlur"><feGaussianBlur in="SourceGraphic" stdDeviation="12"/></filter>
    </defs>
  </svg>

  <audio id="claim-sound" preload="auto">
    <source src="sound/claim.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
