<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pascua - Elige un Huevo</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dropping">
  <canvas id="sky"></canvas>

  <div id="splash">
    <div id="splash-stars"></div>
    <div id="splash-content">
      <img id="logo2" src="images/logo2.png" alt="logo2" />
      <div id="loading-wrap">
        <div id="loading-label">Buscando huevos...</div>
        <div id="loading-bar">
          <div id="loading-progress"></div>
        </div>
      </div>
    </div>
  </div>

  <header class="page-header">
    <h1>Elige un Huevo de Pascua</h1>
  </header>

  <main>
    <img id="logo" src="images/logo.png" alt="logo" class="hide-until-bottom" />
    <div class="stars">
      <button class="star final-1" data-index="0">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg"><path class="halo" d=""></path><path class="body" d=""></path><path class="rim" d=""></path></svg>
          <div class="ground-shadow"></div>
        </div>
      </button>
      <button class="star final-2" data-index="1">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg"><path class="halo" d=""></path><path class="body" d=""></path><path class="rim" d=""></path></svg>
          <div class="ground-shadow"></div>
        </div>
      </button>
      <button class="star final-3" data-index="2">
        <div class="star-inner">
          <svg viewBox="0 0 120 160" class="star-svg"><path class="halo" d=""></path><path class="body" d=""></path><path class="rim" d=""></path></svg>
          <div class="ground-shadow"></div>
        </div>
      </button>
    </div>

    <div id="result" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">¡Ganaste!</h2>
        <p id="prize-text"></p>
        <p id="prize-date" class="prize-date"></p>
        <button id="close-btn" class="btn-primary">Cerrar</button>
      </div>
    </div>
    <div id="confetti"></div>
  </main>

  <footer id="bottom-logo-container"></footer>

  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <filter id="haloBlur"><feGaussianBlur in="SourceGraphic" stdDeviation="10"/></filter>
      <linearGradient id="gradA" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#fff8d8"/><stop offset="100%" stop-color="#b27a12"/>
      </linearGradient>
    </defs>
  </svg>
  <script src="script.js"></script>
</body>
</html>
